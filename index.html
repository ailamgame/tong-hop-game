<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Làm Game?</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- <link rel="stylesheet" href="css/style.css"> -->
     <link rel="stylesheet" href="css/style.css?v=1.00">
</head>

<body>

    <div class="app-container">

        <!-- HEADER -->
        <header class="navbar">
            <div class="logo">
                <img src="assets/images/logo.png" alt="AI Làm Game Logo">
                <span>AI Làm Game?</span>
            </div>

            <!-- <nav class="menu">
                <a href="#">Trang chủ</a>
                <a href="#">Trò chơi</a>
                <a href="#">Danh mục</a>
                <a href="#">Thông tin</a>
            </nav> -->

            <!-- <button class="login-btn">Login</button> -->
        </header>

        <!-- HERO -->
        <section class="hero">

            <div class="hero-content">

                <span class="badge-new">
                    <span class="badge-icon">👑</span>
                    Game Mới Nhất
                </span>

                <h1>SURVIVAL X</h1>

                <h3 class="hero-tagline">
                    Sinh tồn giữa đại dịch zombie
                </h3>

                <p>
                    Khám phá thế giới hậu tận thế rộng lớn,
                    chiến đấu chống lại zombie AI thông minh
                    và nâng cấp kỹ năng để sống sót.
                </p>

                <div class="hero-buttons">
                    <button class="play-now">CHƠI NGAY</button>
                </div>

            </div>

            <div class="hero-image">
                <img src="assets/images/hero.jpg" alt="Survival X">
            </div>

        </section>

        <!-- TRENDING -->
        <section class="trending">
            <h2>Danh sách trò chơi</h2>
            <div class="game-grid" id="gameGrid"></div>
        </section>

    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">

            <span class="close-btn" id="closeModal">✕</span>

            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalMainImage" src="" alt="">
                </div>

                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p class="modal-genre" id="modalGenre"></p>
                    <p id="modalDescription"></p>

                    <h4>Tính năng nổi bật</h4>
                    <ul id="modalFeatures"></ul>

                    <button class="play-now">CHƠI NGAY</button>
                    <button class="tutorial-btn" title="Xem video hướng dẫn làm game trên YouTube" id="tutorialBtn">XEM HƯỚNG DẪN</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/gameData.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
